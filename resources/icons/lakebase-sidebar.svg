<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <defs>
    <!-- Mask to carve out the bottom-right circle from the Lakebase bars -->
    <mask id="carveout">
      <rect width="24" height="24" fill="white"/>
      <circle cx="19" cy="19" r="6" fill="black"/>
    </mask>
  </defs>

  <!-- Grey Lakebase icon with carve-out applied -->
  <g mask="url(#carveout)">
    <!-- Top bar -->
    <rect x="2" y="2" width="20" height="5" rx="0.5" opacity="0.55"/>
    <!-- Middle bar with wavy bottom -->
    <rect x="2" y="9" width="20" height="3.5" rx="0.5" opacity="0.55"/>
    <path d="M2 12.5 C5 12.5 6 14 9 14 C12 14 13 12.5 16 12.5 C19 12.5 20 13.5 22 13.5 L22 14 C22 14 20.5 14 18 14 C15 14 13 15.5 9.5 15.5 C6 15.5 5 14 2 14 Z" opacity="0.55"/>
    <!-- Bottom bar with wavy top edge -->
    <path d="M2 16 C5 16 6 14.5 9.5 14.5 C13 14.5 14 16 17 16 C19.5 16 21 15.3 22 15 L22 20.5 C22 20.78 21.78 21 21.5 21 L2.5 21 C2.22 21 2 20.78 2 20.5 Z" opacity="0.5"/>
  </g>

  <!-- Git branch symbol in the carved-out area -->
  <!-- Main trunk line -->
  <line x1="19" y1="15" x2="19" y2="22.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Branch fork -->
  <line x1="15.5" y1="15.5" x2="19" y2="18.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Dots at endpoints -->
  <circle cx="19" cy="14.8" r="1.4"/>
  <circle cx="19" cy="22.5" r="1.4"/>
  <circle cx="15.5" cy="15.5" r="1.4"/>
</svg>

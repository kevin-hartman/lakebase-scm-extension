<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <!-- Lakebase bars — shortened to leave room for SCM symbol -->
  <!-- Top bar (full width) -->
  <rect x="2" y="1" width="20" height="4.5" rx="0.5" opacity="0.55"/>
  <!-- Middle bar (full width) -->
  <rect x="2" y="7.5" width="20" height="4.5" rx="0.5" opacity="0.55"/>
  <!-- Bottom bar (shortened — stops before SCM symbol area) -->
  <rect x="2" y="14" width="12" height="4.5" rx="0.5" opacity="0.5"/>

  <!-- Git branch symbol (bottom-right, clear space) -->
  <!-- Main trunk line -->
  <line x1="19.5" y1="13.5" x2="19.5" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Branch fork -->
  <line x1="15.5" y1="14.5" x2="19.5" y2="17.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Dots at endpoints -->
  <circle cx="19.5" cy="13.5" r="1.5"/>
  <circle cx="19.5" cy="22" r="1.5"/>
  <circle cx="15.5" cy="14.5" r="1.5"/>
</svg>

# Post-checkout hook writes the current branch URL here so Maven/Flyway/tests use the correct DB.
# If missing, env SPRING_DATASOURCE_* or default below is used. Do not commit this file.
spring.config.import=optional:file:./application-local.properties

# Datasource: application-local.properties (from hook) overrides these. Fallback: env vars, then default.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/databricks_postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA: Flyway owns schema; no runtime DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
